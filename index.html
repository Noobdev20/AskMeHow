<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AskMeHow — DeFi Security Agent</title>
    <script>
      // AskMeHow Compatibility Shield
      // Prevents browser extensions (like Zerion) from crashing the app with "Cannot redefine property" errors
      (function() {
        const _defineProperty = Object.defineProperty;
        Object.defineProperty = function(obj, prop, descriptor) {
          try {
            return _defineProperty.apply(this, arguments);
          } catch (e) {
            // If it's a wallet-related property or a "Cannot redefine" error, suppress the crash
            if (prop === 'isZerion' || prop === 'ethereum' || prop === 'isMetaMask' || e.message?.includes('redefine')) {
              console.warn(`[AskMeHow] Suppressed extension conflict for property: ${prop}`);
              return obj;
            }
            throw e;
          }
        };
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
